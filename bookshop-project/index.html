<!-- =========================
index.html
صفحة تسجيل الدخول
========================= -->
<!DOCTYPE html>
<html lang="en">

<head>

<!-- ترميز الصفحة -->
<meta charset="UTF-8">

<!-- توافق الموبايل -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- عنوان الصفحة -->
<title>Bookshop | Login</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- ملف CSS -->
<link rel="stylesheet" href="style.css">

<style>

/* الناف بار فوق الصورة */
.navbar{
z-index:1000;
}

/* قسم اللوجين فوق الصورة */
.login-section{
position:relative;
z-index:2000;
}

/* زرار اللوجين */
.login-btn{
position:relative;
z-index:3000;
cursor:pointer;
pointer-events:auto;
}

</style>

</head>

<body>

<!-- =========================
Navbar
========================= -->
<nav class="navbar navbar-expand-lg">

<div class="container">

<!-- اللوجو -->
<a href="home.html" class="navbar-brand text-white">
Bookshop
</a>

<!-- زرار التسجيل -->
<div class="ms-auto">

<button type="button"
class="btn btn-light text-danger"
onclick="window.location.href='signup.html'">

Sign Up

</button>

</div>

</div>

</nav>

<!-- =========================
Hero Image
========================= -->
<section class="hero"></section>

<!-- =========================
Login Form
========================= -->
<section class="login-section">

<div class="login-box">

<!-- عنوان -->
<h3>Welcome Back!</h3>

<!-- الإيميل -->
<label>Email</label>
<input type="email"
id="email"
placeholder="admin@gmail.com">

<!-- الباسورد -->
<label>Password</label>
<input type="password"
id="password"
placeholder="123456">

<!-- خيارات -->
<div class="options">

<div class="remember">

<input type="checkbox">

<span>Remember me</span>

</div>

<!-- نسيت كلمة السر -->
<a href="forgot.html">
Forget password?
</a>

</div>

<!-- زرار تسجيل الدخول -->
<button type="button"
class="login-btn"
id="loginBtn">

Log in

</button>

<!-- لينك التسجيل -->
<p class="signup-text">

Don’t have an account?

<a href="signup.html">
Signup
</a>

</p>

</div>

</section>

<!-- =========================
Footer
========================= -->
<footer class="footer">

<div class="container text-center p-4 text-white">

© 2024 Bookshop

</div>

</footer>

<!-- =========================
JavaScript
========================= -->
<script>

/* بعد تحميل الصفحة */
window.onload = function(){

/* لما يدوس لوجين */
document.getElementById("loginBtn").onclick = function(){

/* جلب القيم */
let email =
document.getElementById("email").value.trim();

let password =
document.getElementById("password").value.trim();

/* لو البيانات فاضية */
if(email === "" || password === ""){

alert("Please enter email and password");

return;

}

/* بيانات صحيحة */
if(email === "admin@gmail.com" &&
password === "123456"){

window.location.href = "home.html";

}

/* بيانات غلط */
else{

alert("Wrong email or password");

}

};

};

</script>

</body>
</html>
