<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bookshop</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">

<div class="container">

<a href="#" class="navbar-brand text-white">
Bookshop
</a>

<div class="collapse navbar-collapse">

<ul class="navbar-nav ms-4">

<li class="nav-item">
<a href="#" class="nav-link text-white">Home</a>
</li>

<li class="nav-item">
<a href="#" class="nav-link text-white">Books</a>
</li>

<li class="nav-item">
<a href="#" class="nav-link text-white">About us</a>
</li>

</ul>

<div class="ms-auto">

<button class="btn btn-danger me-2">
Log in
</button>

<button class="btn btn-light text-danger"
onclick="location.href='signup.html'">
Sign Up
</button>

</div>

</div>

</div>

</nav>

<!-- Hero -->
<section class="hero"></section>

<!-- Login -->
<section class="login-section">

<div class="login-box">

<h3>Welcome Back!</h3>

<label>Email</label>
<input type="email" placeholder="example@gmail.com">

<label>Password</label>
<input type="password" placeholder="Enter password">

<div class="options">

<div class="remember">
<input type="checkbox">
<span>Remember me</span>
</div>

<a href="forgot.html">Forget password?</a>

</div>

<button class="login-btn">Log in</button>

<p class="signup-text">
Don’t have an account?
<a href="signup.html">Signup</a>
</p>

<p class="or">or</p>

<button class="social-btn">
<img src="https://cdn-icons-png.flaticon.com/512/281/281764.png" width="20">
Login with Google
</button>

<button class="social-btn">
<img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" width="20">
Login with Facebook
</button>

</div>

</section>

<!-- Footer -->
<footer class="footer">

<div class="container">

<div class="footer-top">

<div class="footer-left">

<a href="#" class="footer-logo">
<i class="bi bi-book me-2"></i>
Bookshop
</a>

<ul class="footer-links">

<li><a href="#">Home</a></li>
<li><a href="#">Books</a></li>
<li><a href="#">About Us</a></li>

</ul>

</div>

<div class="footer-right">

<a href="#"><i class="bi bi-facebook"></i></a>
<a href="#"><i class="bi bi-instagram"></i></a>
<a href="#"><i class="bi bi-youtube"></i></a>
<a href="#"><i class="bi bi-twitter-x"></i></a>

</div>

</div>

<hr>

<div class="footer-bottom">

<p>
&lt;Developed By&gt; EraaSoft &lt;All Copy Rights Reserved&gt; ©2024
</p>

<div class="language-box">

<i class="bi bi-globe"></i>

<select>
<option>English</option>
<option>Arabic</option>
</select>

</div>

</div>

</div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
