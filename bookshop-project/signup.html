<!DOCTYPE html>
<html lang="en">

<head>

<!-- ترميز الصفحة -->
<meta charset="UTF-8">

<!-- توافق الموبايل -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- عنوان الصفحة -->
<title>Bookshop | Sign Up</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<!-- ملف CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- =========================
Navbar
========================= -->
<nav class="navbar navbar-expand-lg">

<div class="container">

<!-- اللوجو -->
<a href="home.html" class="navbar-brand text-white">
Bookshop
</a>

<!-- روابط -->
<div class="collapse navbar-collapse">

<ul class="navbar-nav ms-4">

<li class="nav-item">
<a href="home.html" class="nav-link text-white">
Home
</a>
</li>

<li class="nav-item">
<a href="#" class="nav-link text-white">
Books
</a>
</li>

<li class="nav-item">
<a href="#" class="nav-link text-white">
About us
</a>
</li>

</ul>

<!-- أزرار -->
<div class="ms-auto">

<!-- زرار Login -->
<button class="btn btn-danger me-2"
onclick="location.href='index.html'">

Log in

</button>

<!-- زرار Sign Up -->
<button class="btn btn-light text-danger">

Sign Up

</button>

</div>

</div>

</div>

</nav>

<!-- =========================
Hero Image
========================= -->
<section class="hero"></section>

<!-- =========================
Signup Form
========================= -->
<section class="login-section">

<div class="login-box">

<div class="row">

<!-- الاسم الأول -->
<div class="col-md-6">

<label>First Name</label>

<input type="text"
placeholder="John">

</div>

<!-- الاسم الأخير -->
<div class="col-md-6">

<label>Last Name</label>

<input type="text"
placeholder="Smith">

</div>

</div>

<!-- الإيميل -->
<label class="mt-3">Email</label>

<input type="email"
placeholder="example@gmail.com">

<!-- الباسورد -->
<label>Password</label>

<input type="password"
placeholder="Enter password">

<!-- تأكيد الباسورد -->
<label>Confirm password</label>

<input type="password"
placeholder="Enter password">

<!-- الموافقة -->
<div class="remember mb-3">

<input type="checkbox">

<span>

Agree with

<a href="#">
Terms & Conditions
</a>

</span>

</div>

<!-- زرار التسجيل -->
<button class="login-btn"
onclick="location.href='home.html'">

Sign Up

</button>

<!-- رابط اللوجين -->
<p class="signup-text">

Already have an account?

<a href="index.html">
Login
</a>

</p>

<!-- أو -->
<p class="or">or</p>

<!-- جوجل -->
<button class="social-btn">

<i class="bi bi-google"></i>

Sign up with Google

</button>

<!-- فيسبوك -->
<button class="social-btn">

<i class="bi bi-facebook"></i>

Sign up with Facebook

</button>

</div>

</section>

<!-- =========================
Footer
========================= -->
<footer class="footer">

<div class="container">

<div class="footer-top">

<!-- يسار -->
<div class="footer-left">

<a href="home.html" class="footer-logo">

<i class="bi bi-book me-2"></i>

Bookshop

</a>

<ul class="footer-links">

<li><a href="home.html">Home</a></li>

<li><a href="#">Books</a></li>

<li><a href="#">About Us</a></li>

</ul>

</div>

<!-- يمين -->
<div class="footer-right">

<a href="#"><i class="bi bi-facebook"></i></a>

<a href="#"><i class="bi bi-instagram"></i></a>

<a href="#"><i class="bi bi-youtube"></i></a>

<a href="#"><i class="bi bi-twitter-x"></i></a>

</div>

</div>

<hr>

<div class="footer-bottom">

<p>
&lt;Developed By&gt; EraaSoft
&lt;All Copy Rights Reserved&gt; ©2024
</p>

<div class="language-box">

<i class="bi bi-globe"></i>

<select>
<option>English</option>
<option>Arabic</option>
</select>

</div>

</div>

</div>

</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
